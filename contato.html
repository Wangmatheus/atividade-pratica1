<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title >Formulário Contato</title>
</head>
<body> 
     <header>
        <h1 style="text-align: center;">Formulário para contato:</h1>
    </header>

    <main> 

        <form action="sucesso.html">

        <p style="text-align: center;">
            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" name="nome">
        </p>

        <p style="text-align: center;">
            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email">
        </p>

        <p style="text-align: center;">
            <label for="assunto">Assunto:</label><br>
            <input type="text" id="assunto" name="assunto">
        </p>

        <p style="text-align: center;"> 
            <label for="textarea">Mensagem:</label><br>
            <textarea id="textarea" name="textarea" rows="4" cols="50"></textarea>
        </p>

        <p style="text-align: center;">
            <label for="tel">Telefone:</label><br>
            <input type="tel" id="tel" name="tel" placeholder="(00) 00000-0000">
        </p>

        <p style="text-align: center;">
            <label for="date">Data de contato:</label><br>
            <input type="date" id="date" name="date">
        </p>

        <p style="text-align: center;">
            <label for="select">Motivo de contato:</label><br>
                        <select id="select" name="select">
                            <option value="option">Selecione um motivo</option>
                            <option value="option1">Dúvida</option>
                            <option value="option2">Proposta de emprego</option>
                            <option value="option3">Bases salariais</option>
                            <option value="option4">Outro</option>
                        </select>
        </p>

        <p style="text-align: center;">
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

        </form>
    </main>




    








</body>
</html>
